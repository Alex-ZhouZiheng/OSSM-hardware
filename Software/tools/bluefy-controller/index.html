<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>OSSM Bluefy Controller</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
      color: #17202a;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #eef2f5;
    }
    main {
      width: min(720px, calc(100vw - 32px));
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 0 max(28px, env(safe-area-inset-bottom));
    }
    header, .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
    }
    section {
      margin: 14px 0;
      padding: 16px;
      border: 1px solid #d8e0e7;
      border-radius: 8px;
      background: #fff;
    }
    button, select, input {
      font: inherit;
    }
    button {
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      color: #fff;
      background: #2563eb;
    }
    button.secondary {
      color: #17202a;
      background: #dce4ea;
    }
    button.stop {
      background: #d93025;
    }
    button:disabled {
      opacity: .55;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .field {
      display: grid;
      gap: 8px;
      margin: 14px 0;
    }
    .label {
      color: #52616f;
      font-size: 14px;
    }
    .value {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #52616f;
      font-size: 14px;
      white-space: nowrap;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9aa7b2;
    }
    .dot.live { background: #169b62; }
    .dot.warn { background: #cc7a00; }
    input[type="range"], select {
      width: 100%;
      box-sizing: border-box;
    }
    input[type="range"] {
      accent-color: #2563eb;
    }
    select {
      min-height: 44px;
      border: 1px solid #c8d2dc;
      border-radius: 8px;
      padding: 9px 10px;
      background: #fff;
      color: #17202a;
    }
    pre {
      min-height: 160px;
      max-height: 280px;
      overflow: auto;
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      background: #121820;
      color: #dce8f2;
      font-size: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .muted {
      color: #65717c;
      font-size: 13px;
    }
    @media (prefers-color-scheme: dark) {
      :root { background: #101418; color: #edf2f7; }
      body { background: #0d1116; }
      section { background: #171d24; border-color: #2d3844; }
      .status, .label, .muted { color: #aab6c2; }
      button.secondary { color: #edf2f7; background: #334150; }
      select { border-color: #3b4855; background: #111820; color: #edf2f7; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>OSSM Controller</h1>
      <div class="status"><span id="dot" class="dot"></span><span id="status">Disconnected</span></div>
    </header>

    <section>
      <div class="actions">
        <button id="connect">Connect</button>
        <button id="disconnect" class="secondary" disabled>Disconnect</button>
      </div>
      <p class="muted">Use this page from an HTTPS URL in Bluefy. If the page is refreshed, hidden, or disconnected, the controller sends stop commands and releases Bluetooth.</p>
    </section>

    <section>
      <div class="actions">
        <button id="start">START</button>
        <button id="stop" class="stop">STOP</button>
      </div>
    </section>

    <section>
      <div class="field">
        <div class="row"><span class="label">Speed</span><span id="speedValue" class="value">0%</span></div>
        <input id="speed" type="range" min="0" max="100" value="0">
      </div>
      <div class="field">
        <div class="row"><span class="label">Position</span><span id="positionValue" class="value">0%</span></div>
        <input id="position" type="range" min="0" max="100" value="0">
      </div>
      <div class="field">
        <div class="row"><span class="label">Depth</span><span id="depthValue" class="value">50%</span></div>
        <input id="depth" type="range" min="0" max="100" value="50">
      </div>
      <div class="field">
        <div class="row"><span class="label">Sensation</span><span id="sensationValue" class="value">50%</span></div>
        <input id="sensation" type="range" min="0" max="100" value="50">
      </div>
      <div class="field">
        <div class="row"><span class="label">Pattern</span></div>
        <select id="pattern"></select>
      </div>
    </section>

    <section>
      <div class="actions">
        <button id="refresh" class="secondary">Refresh State</button>
        <button id="clearLog" class="secondary">Clear Log</button>
      </div>
    </section>

    <section>
      <pre id="log"></pre>
    </section>
  </main>

  <script>
    const UUIDS = {
      service: "522b443a-4f53-534d-0001-420badbabe69",
      command: "522b443a-4f53-534d-1000-420badbabe69",
      speedKnob: "522b443a-4f53-534d-1010-420badbabe69",
      state: "522b443a-4f53-534d-2000-420badbabe69",
      patterns: "522b443a-4f53-534d-3000-420badbabe69"
    };
    const DEFAULT_PATTERNS = [
      { idx: 0, name: "Simple Stroke" },
      { idx: 1, name: "Teasing Pounding" },
      { idx: 2, name: "Robo Stroke" },
      { idx: 3, name: "Half'n'Half" },
      { idx: 4, name: "Deeper" },
      { idx: 5, name: "Stop'n'Go" },
      { idx: 6, name: "Insist" }
    ];
    const state = {
      device: null,
      server: null,
      commandChar: null,
      stateChar: null,
      heartbeat: null,
      bleQueue: Promise.resolve(),
      positionTimer: null,
      positionStopTimer: null,
      positionMoveToken: 0,
      positioningActive: false,
      speed: 0,
      position: 0,
      depth: 50,
      sensation: 50,
      pattern: 0
    };
    const encoder = new TextEncoder();
    const decoder = new TextDecoder();
    const $ = (id) => document.getElementById(id);
    const POSITION_MOVE_MS = 800;
    const POSITION_MOVE_SPEED = 15;
    const STREAMING_READY_DELAY_MS = 500;
    const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
    const clampPercent = (value) => Math.max(0, Math.min(100, Number(value) || 0));
    const clampDepthForPosition = (depth, position) => {
      return Math.round(Math.min(clampPercent(depth), 100 - clampPercent(position)));
    };
    const clampPositionForDepth = (position, depth) => {
      return Math.round(Math.min(clampPercent(position), 100 - clampPercent(depth)));
    };
    const deepFromWindow = (position, depth) => {
      const nextPosition = clampPositionForDepth(position, depth);
      const nextDepth = clampDepthForPosition(depth, nextPosition);
      return nextPosition + nextDepth;
    };
    const positionFromWindowSettings = (firmwareDepth, stroke) => {
      return Math.round(clampPercent(clampPercent(firmwareDepth) - clampPercent(stroke)));
    };

    function log(message) {
      const now = new Date().toLocaleTimeString();
      $("log").textContent = `[${now}] ${message}\n` + $("log").textContent;
    }
    function setStatus(text, kind = "") {
      $("status").textContent = text;
      $("dot").className = `dot ${kind}`;
    }
    function setConnected(connected) {
      $("connect").disabled = connected;
      $("disconnect").disabled = !connected;
      setStatus(connected ? "Connected" : "Disconnected", connected ? "live" : "");
    }
    function updateSlider(id, value) {
      const next = clampPercent(value);
      $(id).value = next;
      $(`${id}Value`).textContent = `${next}%`;
    }
    function syncWindowSliders() {
      state.position = clampPositionForDepth(state.position, state.depth);
      state.depth = clampDepthForPosition(state.depth, state.position);
      $("position").max = String(100 - state.depth);
      $("depth").max = String(100 - state.position);
      updateSlider("position", state.position);
      updateSlider("depth", state.depth);
    }
    function applyState(payload, { syncWindow = false } = {}) {
      if (payload.speed !== undefined && !state.positioningActive) state.speed = clampPercent(payload.speed);
      if (syncWindow && !state.positioningActive && (payload.depth !== undefined || payload.stroke !== undefined)) {
        const firmwareDepth = payload.depth !== undefined ? clampPercent(payload.depth) : deepFromWindow(state.position, state.depth);
        const firmwareStroke = payload.stroke !== undefined ? clampPercent(payload.stroke) : state.depth;
        state.position = clampPositionForDepth(positionFromWindowSettings(firmwareDepth, firmwareStroke), firmwareStroke);
        state.depth = clampDepthForPosition(firmwareStroke, state.position);
      }
      if (payload.sensation !== undefined) state.sensation = clampPercent(payload.sensation);
      if (payload.pattern !== undefined) state.pattern = payload.pattern;

      updateSlider("speed", state.speed);
      syncWindowSliders();
      updateSlider("sensation", state.sensation);
      $("pattern").value = String(state.pattern);
      if (payload.state) setStatus(payload.state, "live");
    }
    async function sendCommand(command) {
      const commandChar = state.commandChar;
      if (!commandChar) throw new Error("Not connected");
      log(`TX ${command}`);
      await withBleOperation(() => commandChar.writeValue(encoder.encode(command)));
    }
    function withBleOperation(task) {
      const run = state.bleQueue.catch(() => {}).then(task);
      state.bleQueue = run.catch(() => {});
      return run;
    }
    async function sendMotionWindow() {
      await sendCommand(`set:stroke:${state.depth}`);
      await sendCommand(`set:depth:${deepFromWindow(state.position, state.depth)}`);
    }
    function streamingDepthForAbsolutePosition(position, streamingStroke) {
      const nextPosition = clampPercent(position);
      const nextStroke = clampPercent(streamingStroke);
      if (nextStroke >= 100) return 100;
      return Math.round(clampPercent((nextPosition * 100) / (100 - nextStroke)));
    }
    async function moveToShallowPosition() {
      if (!state.commandChar) return;
      const token = ++state.positionMoveToken;
      state.positioningActive = true;
      clearTimeout(state.positionStopTimer);
      syncWindowSliders();

      try {
        const streamStroke = state.position >= 99 ? 0 : 1;
        const streamDepth = streamingDepthForAbsolutePosition(state.position, streamStroke);
        const streamTarget = token % 2 === 0 ? 1 : 0;

        const sendIfCurrent = async (command) => {
          if (token !== state.positionMoveToken) return false;
          await sendCommand(command);
          return token === state.positionMoveToken;
        };
        const finishPositioning = async () => {
          if (token !== state.positionMoveToken) return;
          await sendCommand("set:speed:0");
          if (token !== state.positionMoveToken) return;
          await sendCommand("go:menu");
          if (token !== state.positionMoveToken) return;
          await sendMotionWindow();
          if (token === state.positionMoveToken) state.positioningActive = false;
        };

        if (!await sendIfCurrent("set:speed:0")) return;
        if (!await sendIfCurrent("go:menu")) return;
        if (!await sendIfCurrent("go:streaming")) return;
        await sleep(STREAMING_READY_DELAY_MS);
        if (token !== state.positionMoveToken) return;
        if (!await sendIfCurrent(`set:stroke:${streamStroke}`)) return;
        if (!await sendIfCurrent(`set:depth:${streamDepth}`)) return;
        if (!await sendIfCurrent(`set:speed:${POSITION_MOVE_SPEED}`)) return;
        await sleep(80);
        if (token !== state.positionMoveToken) return;
        if (!await sendIfCurrent(`stream:${streamTarget}:${POSITION_MOVE_MS}`)) return;

        state.positionStopTimer = setTimeout(() => {
          if (token !== state.positionMoveToken) return;
          finishPositioning()
            .catch((err) => log(`ERR ${err.message}`));
        }, POSITION_MOVE_MS + 250);
      } catch (err) {
        state.positioningActive = false;
        log(`ERR ${err.message}`);
      }
    }
    function scheduleMoveToShallowPosition() {
      clearTimeout(state.positionTimer);
      state.positionTimer = setTimeout(() => {
        void moveToShallowPosition();
      }, 180);
    }
    async function readDeviceState({ logState = false, syncWindow = false } = {}) {
      const stateChar = state.stateChar;
      if (!stateChar) return;
      const raw = decoder.decode(await withBleOperation(() => stateChar.readValue()));
      if (logState) log(`RX state: ${raw}`);
      if (!raw.trim().startsWith("{")) {
        if (logState) log(`RX non-state: ${raw}`);
        return null;
      }
      applyState(JSON.parse(raw), { syncWindow });
    }
    function clearConnection() {
      clearInterval(state.heartbeat);
      clearTimeout(state.positionTimer);
      clearTimeout(state.positionStopTimer);
      state.heartbeat = null;
      state.positionTimer = null;
      state.positionStopTimer = null;
      state.positioningActive = false;
      state.device = null;
      state.server = null;
      state.commandChar = null;
      state.stateChar = null;
      state.bleQueue = Promise.resolve();
      setConnected(false);
      updateSlider("speed", 0);
    }
    async function cleanupAndDisconnect({ sendStop = true } = {}) {
      const commandChar = state.commandChar;
      const server = state.server;
      if (sendStop && commandChar) {
        try {
          log("TX set:speed:0");
          await commandChar.writeValue(encoder.encode("set:speed:0"));
          log("TX go:menu");
          await commandChar.writeValue(encoder.encode("go:menu"));
        } catch (err) {
          log(`ERR cleanup: ${err.message}`);
        }
      }
      try {
        if (server && server.connected) server.disconnect();
      } catch (err) {
        log(`ERR disconnect: ${err.message}`);
      }
      clearConnection();
    }
    async function connect() {
      if (!navigator.bluetooth) {
        setStatus("Web Bluetooth unavailable", "warn");
        log("ERR Web Bluetooth is not available in this browser");
        return;
      }
      try {
        setStatus("Connecting", "warn");
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [UUIDS.service] }],
          optionalServices: [UUIDS.service]
        });
        device.addEventListener("gattserverdisconnected", clearConnection);
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(UUIDS.service);
        state.device = device;
        state.server = server;
        state.commandChar = await service.getCharacteristic(UUIDS.command);
        state.stateChar = await service.getCharacteristic(UUIDS.state);

        try {
          const speedKnobChar = await service.getCharacteristic(UUIDS.speedKnob);
          await speedKnobChar.writeValue(encoder.encode("false"));
          log("TX speedKnobLimit: false");
        } catch (err) {
          log(`WARN speed knob config unavailable: ${err.message}`);
        }
        try {
          const patternsChar = await service.getCharacteristic(UUIDS.patterns);
          const patterns = JSON.parse(decoder.decode(await patternsChar.readValue()));
          loadPatterns(Array.isArray(patterns) && patterns.length ? patterns : DEFAULT_PATTERNS);
        } catch (err) {
          loadPatterns(DEFAULT_PATTERNS);
        }

        await sendCommand("set:speed:0");
        await sendCommand("go:menu");
        await readDeviceState({ logState: true });
        clearInterval(state.heartbeat);
        state.heartbeat = setInterval(() => {
          readDeviceState().catch((err) => {
            log(`ERR heartbeat: ${err.message}`);
            void cleanupAndDisconnect({ sendStop: false });
          });
        }, 1500);
        setConnected(true);
        log(`Connected to ${device.name || "OSSM"}`);
      } catch (err) {
        log(`ERR connect: ${err.message}`);
        clearConnection();
      }
    }
    function loadPatterns(patterns) {
      $("pattern").innerHTML = "";
      for (const pattern of patterns) {
        const option = document.createElement("option");
        option.value = pattern.idx;
        option.textContent = pattern.name;
        $("pattern").appendChild(option);
      }
    }

    for (const id of ["speed", "position", "depth", "sensation"]) {
      $(id).addEventListener("input", () => {
        $(`${id}Value`).textContent = `${$(id).value}%`;
      });
    }
    $("speed").addEventListener("change", () => {
      state.speed = clampPercent($("speed").value);
      sendCommand(`set:speed:${state.speed}`).catch((err) => log(`ERR ${err.message}`));
    });
    $("position").addEventListener("input", () => {
      state.position = clampPositionForDepth($("position").value, state.depth);
      syncWindowSliders();
      scheduleMoveToShallowPosition();
    });
    $("position").addEventListener("change", () => {
      clearTimeout(state.positionTimer);
      state.position = clampPositionForDepth($("position").value, state.depth);
      syncWindowSliders();
      void moveToShallowPosition();
    });
    $("depth").addEventListener("input", () => {
      state.depth = clampDepthForPosition($("depth").value, state.position);
      syncWindowSliders();
    });
    $("depth").addEventListener("change", () => {
      state.depth = clampDepthForPosition($("depth").value, state.position);
      syncWindowSliders();
      sendMotionWindow().catch((err) => log(`ERR ${err.message}`));
    });
    $("sensation").addEventListener("change", () => {
      state.sensation = clampPercent($("sensation").value);
      sendCommand(`set:sensation:${state.sensation}`).catch((err) => log(`ERR ${err.message}`));
    });
    $("pattern").addEventListener("change", () => {
      state.pattern = Number($("pattern").value);
      sendCommand(`set:pattern:${state.pattern}`).catch((err) => log(`ERR ${err.message}`));
    });
    $("start").addEventListener("click", () => {
      clearTimeout(state.positionTimer);
      clearTimeout(state.positionStopTimer);
      state.positionMoveToken++;
      state.positioningActive = false;
      const nextSpeed = state.speed > 0 ? state.speed : 30;
      state.speed = nextSpeed;
      updateSlider("speed", nextSpeed);
      sendCommand("set:speed:0")
        .then(() => sendCommand("go:menu"))
        .then(() => sendMotionWindow())
        .then(() => sendCommand("go:strokeEngine"))
        .then(() => sendCommand(`set:speed:${nextSpeed}`))
        .catch((err) => log(`ERR ${err.message}`));
    });
    $("stop").addEventListener("click", () => {
      clearTimeout(state.positionTimer);
      clearTimeout(state.positionStopTimer);
      state.positionMoveToken++;
      state.positioningActive = false;
      state.speed = 0;
      updateSlider("speed", 0);
      sendCommand("set:speed:0").catch((err) => log(`ERR ${err.message}`));
    });
    $("connect").addEventListener("click", connect);
    $("disconnect").addEventListener("click", () => cleanupAndDisconnect({ sendStop: true }));
    $("refresh").addEventListener("click", () => readDeviceState({ logState: true }).catch((err) => log(`ERR ${err.message}`)));
    $("clearLog").addEventListener("click", () => $("log").textContent = "");
    window.addEventListener("pagehide", () => void cleanupAndDisconnect({ sendStop: true }));
    window.addEventListener("beforeunload", () => void cleanupAndDisconnect({ sendStop: true }));
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") void cleanupAndDisconnect({ sendStop: true });
    });

    loadPatterns(DEFAULT_PATTERNS);
    syncWindowSliders();
    log("Controller ready");
  </script>
</body>
</html>
